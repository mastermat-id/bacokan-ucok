plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def readSecret = { envKey, propertyKey ->
    def envValue = System.getenv(envKey)
    if (envValue != null && !envValue.trim().isEmpty()) {
        return envValue
    }
    return keystoreProperties[propertyKey]
}

android {
    namespace = "com.mastermat.bacokanucok"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.mastermat.bacokanucok"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            def storeFilePath = readSecret("ANDROID_KEYSTORE_PATH", "storeFile")
            if (storeFilePath != null) {
                keyAlias readSecret("ANDROID_KEY_ALIAS", "keyAlias")
                keyPassword readSecret("ANDROID_KEY_PASSWORD", "keyPassword")
                storeFile file(storeFilePath)
                storePassword readSecret("ANDROID_STORE_PASSWORD", "storePassword")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )
            signingConfig = (readSecret("ANDROID_KEYSTORE_PATH", "storeFile") != null)
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

dependencies {
    implementation "com.google.android.play:core:1.10.3"
}

flutter {
    source = "../.."
}
